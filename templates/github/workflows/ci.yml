# Starter merge-blocking CI — mirrors the gate order in the `governance` skill.
# Copy to .github/workflows/ci.yml in the consuming project, then adapt the package
# manager, Node version, and any project-specific steps. Every job here must pass for a PR to merge.
name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # pin to a commit SHA in production per `governance`
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          # cache: npm  # set to your package manager (npm/pnpm/yarn)
      # Frozen, script-free install (use your repo's package manager)
      - run: npm ci --ignore-scripts

      # 1. Typecheck + lint (ESLint + Stylelint)
      - run: npm run typecheck
      - run: npm run lint

      # 2. Unit + story tests (Vitest incl. Storybook Vitest addon); a11y serious/critical fail
      - run: npm run test

      # 3. E2E on critical paths + axe scan (Playwright)
      - run: npx playwright install --with-deps
      - run: npm run test:e2e

      # 4. Dependency audit — high + critical block
      - run: npm audit --audit-level=high

      # 7. Bundle-size budget (size-limit) — copy templates/size-limit.json to the repo root,
      # install a preset (`npm i -D size-limit @size-limit/preset-app`), add "size": "size-limit"
      # to package.json scripts, and tune the limit/path to your build. Without a preset it no-ops.
      - run: npm run size

  secrets-scan:
    # 5. Secrets scan — any finding blocks (also run in pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          # gitleaks-action@v2 requires a (free-to-obtain) license key for ORGANIZATION-owned
          # repos — without it this job fails. Set the GITLEAKS_LICENSE repo/org secret. Personal
          # repos don't need it. Free alternative if you can't license: `trufflehog` (filesystem/git
          # scan). Mirrors `governance` gate 5 ("gitleaks or equivalent").
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  license-scan:
    # 6. License check — denied license blocks (policy in `governance`)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: npm ci --ignore-scripts
      - run: npx license-checker --production --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD"

  security-review:
    # 8. Honor-system controls lint cannot catch (zod-at-boundary, IDOR, webhook signatures).
    # Semgrep gives them a machine backstop; tune rules to your stack and add org rulesets.
    # NOTE: the old `semgrep/semgrep-action@v1` is archived/deprecated — run the CLI instead.
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep # pin to a digest (semgrep/semgrep@sha256:…) in production
    steps:
      - uses: actions/checkout@v4
      # `semgrep ci` exits non-zero on ERROR-severity findings, blocking the merge like any
      # other gate. No Semgrep AppSec account/token is needed when SEMGREP_RULES is set.
      - run: semgrep ci
        env:
          # Curated rulesets + the project rules in ./.semgrep/*.yml.
          SEMGREP_RULES: >-
            p/owasp-top-ten
            p/react
            p/typescript
            ./.semgrep/
      # Project rules live in .semgrep/*.yml (shipped: webhook-missing-verify, SSRF, secret
      # exposure, unsanitized HTML). zod-at-boundary and IDOR have no reliable static rule —
      # they stay human review-only per `governance` gate 8.
