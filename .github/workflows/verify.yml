# This rules repo's OWN merge gate — it applies its own governance to itself.
# Verifies the things prose can't: hook behavior, frontmatter validity,
# CHANGELOG order, cross-reference resolution, and sensitive-path list sync.
# Actions pinned by commit SHA per the `governance` skill.
name: verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 (Node 24 runtime; SHA = peeled commit of the annotated tag)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 (Node 24 runtime)
        with:
          node-version: 22

      # Hooks behave as documented (the enforcement layer is itself tested)
      - name: Hook tests — sensitive-paths (Edit/Write gate)
        run: node .claude/hooks/sensitive-paths.test.mjs
      - name: Hook tests — sensitive-bash (Bash heuristic gate)
        run: node .claude/hooks/sensitive-bash.test.mjs

      # settings.json is valid JSON (a broken file silently disables all hooks)
      - name: settings.json parses
        run: node -e "JSON.parse(require('fs').readFileSync('.claude/settings.json','utf8'))"

      # Structural invariants
      - name: CHANGELOG strictly reverse-chronological
        run: node scripts/check-changelog.mjs
      - name: Cross-references resolve (skills, tables, path refs)
        run: node scripts/check-crossrefs.mjs
      - name: Sensitive-path lists in sync (hook = canonical)
        run: node scripts/check-sync.mjs
      - name: Workflow scripts parse under harness wrapping
        run: node scripts/check-workflow-syntax.mjs
      - name: plugin/ is fresh (generated from .claude/, no drift)
        run: node scripts/build-plugin.mjs --check
      - name: CLAUDE.md is fresh (generated from core/ + default profile)
        run: node scripts/build-claude-md.mjs --check

      # Installer smoke: the @import append is the mechanism that makes the security
      # floor load on existing projects — it must never regress silently.
      - name: Installer smoke (3 profiles + import append + idempotency)
        run: |
          set -e
          for prof in css-modules tailwind minimal; do
            d="$RUNNER_TEMP/smoke-$prof"; mkdir -p "$d"
            echo "# existing" > "$d/CLAUDE.md"
            ./install.sh "$d" --styling "$prof" > /dev/null
            grep -qF '@CLAUDE.md.fable-skills' "$d/CLAUDE.md"
            test -f "$d/CLAUDE.md.fable-skills"
            grep -q "styling: $prof" "$d/.claude/fable-skills-version"
            ./install.sh "$d" --styling "$prof" > /dev/null   # idempotent re-run
            test "$(grep -cF '@CLAUDE.md.fable-skills' "$d/CLAUDE.md")" = 1
          done
          d="$RUNNER_TEMP/smoke-tailwind"
          test -d "$d/.claude/skills/tailwind" && test ! -d "$d/.claude/skills/css-modules"
          d="$RUNNER_TEMP/smoke-minimal"
          test ! -f "$d/.claude/rules/styling.md"
          # merge-collision: same command under a NARROWER matcher must not block our wiring
          d="$RUNNER_TEMP/smoke-merge"; mkdir -p "$d/.claude"
          printf '{"hooks":{"PreToolUse":[{"matcher":"Edit","hooks":[{"type":"command","command":"node \\"$CLAUDE_PROJECT_DIR/.claude/hooks/sensitive-paths.mjs\\""}]}]}}' > "$d/.claude/settings.json"
          ./install.sh "$d" > /dev/null
          node -e "
            const s=require('$d/.claude/settings.json');
            const groups=s.hooks.PreToolUse;
            const wide=groups.some(g=>g.matcher==='Edit|Write|NotebookEdit');
            const narrow=groups.some(g=>g.matcher==='Edit');
            if(!wide||!narrow){console.error('merge-collision failed',JSON.stringify(groups));process.exit(1);}
          "
          # sync-state stamp: fresh install must stamp synchronized
          grep -q 'state: synchronized' "$RUNNER_TEMP/smoke-css-modules/.claude/fable-skills-version"
          echo "installer smoke OK"
      - name: Reviewer write-guard tests
        run: node .claude/hooks/reviewer-write-guard.test.mjs

      # Compat matrix: the install/update paths a real adopter will hit.
      # Deterministic (no model calls) — safe as a permanent merge gate.
      - name: Compat matrix (upgrade / force-sync / non-git / customized)
        run: |
          set -e
          # (1) upgrade path: install from the v3.0.0 tag, then update with current
          git fetch --depth 1 origin tag v3.0.0
          git worktree add "$RUNNER_TEMP/old-src" v3.0.0
          d="$RUNNER_TEMP/compat-upgrade"; mkdir -p "$d"
          "$RUNNER_TEMP/old-src/install.sh" "$d" > /dev/null
          test ! -f "$d/.claude/hooks/reviewer-write-guard.mjs"   # didn't exist at v3.0.0
          ./install.sh "$d" > /dev/null
          test -f "$d/.claude/hooks/reviewer-write-guard.mjs"     # new file arrives on update
          grep -q "state: customized" "$d/.claude/fable-skills-version"  # old files preserved, honestly stamped
          # (2) --force brings the target to full sync
          ./install.sh "$d" --force > /dev/null
          grep -q "state: synchronized" "$d/.claude/fable-skills-version"
          # (3) non-git copy install (e.g. downloaded zip): works, stamps version unknown
          rsync -a --exclude .git --exclude plugin --exclude eval . "$RUNNER_TEMP/nogit-src/"
          d2="$RUNNER_TEMP/compat-nogit"; mkdir -p "$d2"
          "$RUNNER_TEMP/nogit-src/install.sh" "$d2" > /dev/null
          grep -q "version: unknown" "$d2/.claude/fable-skills-version"
          # (4) customized target: local edit survives update and is stamped
          d3="$RUNNER_TEMP/compat-custom"; mkdir -p "$d3"
          ./install.sh "$d3" > /dev/null
          echo "LOCAL EDIT" >> "$d3/.claude/skills/retro/SKILL.md"
          ./install.sh "$d3" > /dev/null
          grep -q "LOCAL EDIT" "$d3/.claude/skills/retro/SKILL.md"
          grep -q "state: customized" "$d3/.claude/fable-skills-version"
          echo "compat matrix OK"

      # Frontmatter validity (skills/agents/rules/output-styles)
      - name: Install PyYAML (pinned)
        run: python3 -m pip install --quiet pyyaml==6.0.3
      - name: Frontmatter valid and complete
        run: python3 scripts/check_frontmatter.py
